- defaults:
    link:
      create: true
      relink: true

- clean: ["~", "~/.config"]

- link:
    ~/.bashrc: bash/.bashrc
    ~/.config/bash:
      glob: true
      path: bash/*
      exclude: [bash/.bashrc]
    ~/.config/clangd: clangd
    ~/.config/starship.toml: starship/starship.toml
    ~/.config/fish: fish
    ~/.config/wezterm: wezterm
    ~/.fonts: fonts
    ~/.gitconfig: git/.gitconfig
    ~/.gitignore_global: git/.gitignore_global
    ~/.git-commit-template.txt: git/.git-commit-template.txt
    ~/.pip: pip
    ~/.tmux: tmux/.tmux
    ~/.tmux.conf: tmux/.tmux.conf
    ~/.config/nvim: lazyvim
    ~/.config/neovide: neovide
    ~/.vim: vim/.vim
    ~/.vimrc: vim/.vimrc
    ~/.vscode: vscode
    ~/.config/yazi: yazi
    # windows
    ~/pip/pip.ini:
      path: pip/pip.conf
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    ~/.glzr:
      path: glzr
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    $LOCALAPPDATA/clangd/config.yaml:
      path: clangd/config.yaml
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    $LOCALAPPDATA/nvim:
      path: lazyvim
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    $APPDATA/neovide:
      path: neovide
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    $APPDATA/Microsoft/Windows/Start Menu/Programs/Startup/keymaps.ahk:
      path: autohotkey/keymaps.ahk
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"
    $APPDATA/listary/UserProfile/Settings/Preferences.json:
      path: listary/Preferences.json
      if: bash -c "scoop list listary | grep -q 'Version'"
    $SCOOP/apps/vscode/current/data/user-data/User/settings.json:
      path: vscode/settings.json
      if: bash -c "scoop list vscode | grep -q 'Version'"
    $SCOOP/apps/vscode/current/data/user-data/User/keybindings.json:
      path: vscode/keybindings.json
      if: bash -c "scoop list vscode | grep -q 'Version'"
    $SCOOP/apps/vscode/current/data/user-data/User/snippets:
      path: vscode/snippets
      if: bash -c "scoop list vscode | grep -q 'Version'"
    $SCOOP/apps/vscode/current/data/user-data/User/.vscodevimrc:
      path: vscode/.vscodevimrc
      if: bash -c "scoop list vscode | grep -q 'Version'"
    $SCOOP/apps/windows-terminal/current/settings/settings.json:
      path: windows-terminal/settings.json
      if: bash -c "scoop list windows-terminal | grep -q 'Version'"
    $APPDATA/yazi/config:
      path: yazi
      if: bash -c "uname -s | grep -iqE 'msys|mingw'"

- shell:
    - git submodule sync --recursive
    - git submodule update --init --recursive
    - >
      git clean -fdx tmux/.tmux/plugins/
